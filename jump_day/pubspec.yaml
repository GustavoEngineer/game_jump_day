  #   - family: Monospace
  #     fonts:
  #       - asset: assets/fonts/Orbitron-Bold.ttf
  #         weight: 700

  assets:
    - assets/images/player/
    - assets/images/player/craftpix-net-622999-free-pixel-art-tiny-hero-sprites/1 Pink_Monster/
    - assets/images/player/craftpix-net-622999-free-pixel-art-tiny-hero-sprites/2 Owlet_Monster/
    - assets/images/player/craftpix-net-622999-free-pixel-art-tiny-hero-sprites/3 Dude_Monster/